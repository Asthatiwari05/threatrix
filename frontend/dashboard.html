<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-black text-white">

<div class="p-6 text-center">

  <h1 class="text-4xl text-red-500 mb-6">⚡ Threat Dashboard</h1>

  <!-- Cards -->
  <div class="grid grid-cols-3 gap-4 mb-10">

    <div class="bg-gray-900 p-4 rounded">
      <h2>Total Transactions</h2>
      <p id="total" class="text-2xl text-green-400">0</p>
    </div>

    <div class="bg-gray-900 p-4 rounded">
      <h2>High Risk</h2>
      <p id="high" class="text-2xl text-red-500">0</p>
    </div>

    <div class="bg-gray-900 p-4 rounded">
      <h2>Alerts</h2>
      <p id="alerts" class="text-2xl text-yellow-400">0</p>
    </div>

  </div>

  <!-- Chart -->
  <div class="bg-gray-900 p-6 rounded w-1/2 mx-auto">
    <canvas id="chart"></canvas>
  </div>

</div>

<script src="js/dashboard.js"></script>
</body>
</html>
