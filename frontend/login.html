<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen text-white">

<div class="bg-gray-900 p-8 rounded-xl shadow-lg w-80 text-center">
  <h2 class="text-2xl mb-6 text-red-500">Login</h2>

  <input id="email" type="email" placeholder="Email"
    class="w-full mb-4 p-2 bg-black border border-gray-700 rounded">

  <input id="password" type="password" placeholder="Password"
    class="w-full mb-4 p-2 bg-black border border-gray-700 rounded">

  <button onclick="login()"
    class="bg-red-500 w-full py-2 rounded hover:bg-red-700">
    Login
  </button>
</div>

<script src="js/auth.js"></script>
</body>
</html>
