<!DOCTYPE html>
<html>
<head>
  <title>THREATRIX</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at top, #0f172a, #000000);
      overflow: hidden;
    }

    /* subtle grid texture */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    /* glow effect */
    .glow {
      text-shadow: 0 0 10px rgba(255,0,0,0.7),
                   0 0 20px rgba(255,0,0,0.5),
                   0 0 40px rgba(255,0,0,0.3);
    }

    .btn-glow {
      box-shadow: 0 0 10px rgba(255,0,0,0.6),
                  0 0 20px rgba(255,0,0,0.4);
    }
  </style>
</head>

<body class="flex items-center justify-center h-screen text-white relative">

<!-- MAIN CONTAINER -->
<div class="relative z-10 text-center space-y-8 px-6">

  <!-- ICON -->
  <div class="text-6xl animate-pulse">⚠️</div>

  <!-- TITLE -->
  <h1 class="text-5xl md:text-6xl font-extrabold text-red-500 glow tracking-widest">
    THREATRIX
  </h1>

  <!-- SUBTEXT -->
  <p class="text-gray-400 text-lg tracking-wide">
    Real-time Threat Detection System
  </p>

  <!-- BUTTON -->
  <div class="pt-4">
    <a href="login.html"
       class="bg-red-500 px-8 py-3 rounded-xl text-lg font-bold hover:bg-red-700 transition btn-glow">
       Enter Dashboard →
    </a>
  </div>

</div>

</body>
</html>
